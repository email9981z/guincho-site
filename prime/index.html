    <style>
      /* Custom Glow Button Animation */
      .glow-btn {
        position: relative;
        isolation: isolate;
        overflow: hidden;
      }
      
      .glow-btn::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.3),
          transparent
        );
        transition: left 0.5s ease-in-out;
        z-index: -1;
        pointer-events: none;
      }

      .glow-btn:hover::before {
        left: 100%;
      }

      .glow-btn[data-state="clicked"] {
        transform: scale(0.95);
      }
    </style>
